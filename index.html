<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>thereafter - There Insight</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <div class="hero-top">
        <div class="brand">
          <img src="logo_white.png" alt="thereafter" class="brand-logo">
        </div>
        <div class="view-mode" id="view-mode">
          <button class="mode-btn active" data-mode="public">공개</button>
          <button class="mode-btn" data-mode="meeting">미팅용</button>
          <button class="mode-btn" data-mode="internal">내부용</button>
        </div>
      </div>
      <h1 class="main-title">There Insight</h1>
      <div class="search-box">
        <span class="search-icon">&#128270;</span>
        <input type="text" id="search-input" placeholder="인사이트명, 키워드, 법칙으로 검색...">
      </div>
    </div>
  </header>

  <section class="filter-bar">
    <div class="filter-inner">
      <div class="filter-group">
        <h3>BTL 유형</h3>
        <div class="filter-tags" id="btl-tags"></div>
      </div>
      <div class="filter-group">
        <h3>트랙</h3>
        <div class="filter-tags" id="track-tags"></div>
      </div>
      <div class="filter-group">
        <h3>법칙</h3>
        <div class="filter-tags" id="law-tags"></div>
      </div>
      <div class="filter-group">
        <h3>키워드</h3>
        <div class="keyword-filter" id="keyword-filter">
          <div class="keyword-selected" id="keyword-selected"></div>
          <div class="keyword-input-wrap">
            <input type="text" id="keyword-input" class="keyword-input" placeholder="키워드 검색..." autocomplete="off">
            <div class="keyword-dropdown" id="keyword-dropdown"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <main class="content">
    <div class="content-inner">
      <div class="controls">
        <span class="result-count">검색 결과: <span id="result-count">0건</span></span>
        <button class="reset-btn" id="reset-btn">전체 보기</button>
      </div>
      <div class="insight-list" id="insight-list"></div>
    </div>
  </main>

  <footer>
    <p>thereafter &copy; 2024</p>
  </footer>

  <div class="combo-panel" id="combo-panel"></div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-backdrop"></div>
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightbox-close">&times;</button>
      <img id="lightbox-img" src="" alt="">
    </div>
  </div>

  <script src="app.js?v=20260223"></script>
</body>
</html>
